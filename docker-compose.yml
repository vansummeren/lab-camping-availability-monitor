services:
  bakkum-watcher:
    build: .
    container_name: bakkum-watcher
    restart: unless-stopped
    environment:
      WINDOW_START: "${WINDOW_START:-2026-07-25}"
      WINDOW_END: "${WINDOW_END:-2026-07-31}"
      MIN_NIGHTS: "${MIN_NIGHTS:-4}"
      CHECK_INTERVAL: "${CHECK_INTERVAL:-300}"
      NTFY_URL: "${NTFY_URL:-}"
      HA_WEBHOOK_URL: "${HA_WEBHOOK_URL:-}"
      LEVELS: "${LEVELS:-257,265,21636,10514,259,260,266,258}"
      NOTIFY_ON_ERROR: "${NOTIFY_ON_ERROR:-0}"
      ADULTS: "${ADULTS:-2}"
    volumes:
      - bakkum_data:/data
volumes:
  bakkum_data: